<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2B1A1F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Lady Fresa">
<title>Lady Fresa · Inventario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --fresa:#E8294B; --fresa-dark:#B31A38;
  --ink:#2B1A1F; --muted:#8A7178;
  --cream:#FFF6F3; --card:#FFFFFF; --line:#F2DDE1;
  --leaf:#2F8F5B; --amber:#D98614; --azul:#1F6B8C;
  --shadow:0 1px 2px rgba(43,26,31,.05), 0 6px 18px -10px rgba(43,26,31,.18);
  --safe-b: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior-y:contain}
body{
  font-family:'Archivo',system-ui,-apple-system,sans-serif;
  background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;
  font-size:16px;
  padding-bottom:calc(78px + var(--safe-b));   /* espacio para el menú de abajo */
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;color:inherit;font-size:16px}  /* 16px evita el zoom de iOS */
.wrap{max-width:760px;margin:0 auto;padding:0 14px}
.mono{font-family:'IBM Plex Mono',monospace}

/* ===== Login ===== */
#login{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:22px}
.loginbox{width:100%;max-width:380px;text-align:center}
.loginbox .big{font-family:'Instrument Serif',serif;font-size:40px;margin-bottom:4px}
.loginbox .big em{color:var(--fresa);font-style:italic}
.loginbox .sublog{color:var(--muted);font-size:14px;margin-bottom:24px}
.loginbox .card{padding:20px}
.lbl{display:block;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.14em;font-weight:800;color:var(--muted);margin-bottom:7px}
.loginbox select,.loginbox input{width:100%;margin-bottom:16px;padding:14px}
.loginbox input{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:26px;letter-spacing:.45em;font-weight:700;padding-left:.45em}
.loginerr{color:var(--fresa);font-size:13px;font-weight:700;margin-bottom:10px;min-height:18px}

/* ===== Header ===== */
header{background:var(--ink);color:#fff;position:sticky;top:0;z-index:40;padding-top:env(safe-area-inset-top,0px)}
.hrow{display:flex;align-items:center;gap:10px;padding:12px 14px;max-width:760px;margin:0 auto}
.brand{font-family:'Instrument Serif',serif;font-size:21px;line-height:1;white-space:nowrap}
.brand em{color:var(--fresa);font-style:italic}
.aqui{background:#3D272D;border:1px solid #55393F;color:#fff;border-radius:20px;padding:7px 12px;font-size:12px;font-weight:700;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
select.aqui{padding-right:24px}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--leaf);flex:none}
.dot.busy{background:var(--amber)}
.dot.err{background:var(--fresa)}
.iconbtn{color:#C8B3B8;font-size:12px;font-weight:700;padding:8px 6px}
.iconbtn:active{color:#fff}

/* ===== Menú inferior ===== */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:45;
  background:#fff;border-top:1px solid var(--line);
  display:flex;padding-bottom:var(--safe-b);
  box-shadow:0 -4px 20px -12px rgba(43,26,31,.35);
}
.tabbar button{
  flex:1;padding:9px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10px;font-weight:700;color:var(--muted);position:relative;min-height:60px;justify-content:center;
}
.tabbar button .ic{font-size:19px;line-height:1}
.tabbar button.on{color:var(--fresa)}
.tabbar button .pip{
  position:absolute;top:5px;right:calc(50% - 20px);
  min-width:17px;height:17px;line-height:17px;background:var(--fresa);color:#fff;
  border-radius:9px;font-size:10px;font-weight:800;padding:0 4px;
}

/* ===== Estructura de página ===== */
h2.page{font-family:'Instrument Serif',serif;font-size:25px;font-weight:400;margin:18px 0 2px}
p.sub{color:var(--muted);font-size:13.5px;line-height:1.5;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.14em;font-weight:800;color:var(--muted)}
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px}
.empty b{display:block;color:var(--ink);font-size:16px;margin-bottom:5px;font-weight:700}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
input[type=text],input[type=number],input[type=password],select{
  border:1px solid var(--line);border-radius:11px;padding:12px;background:#fff;
}
input:focus,select:focus{outline:2px solid var(--fresa);outline-offset:-1px;border-color:transparent}

.btn{background:var(--fresa);color:#fff;border-radius:12px;padding:14px 18px;font-weight:700;font-size:15px}
.btn:active{background:var(--fresa-dark)}
.btn:disabled{opacity:.4}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.ghost:active{background:var(--cream)}
.btn.dark{background:var(--ink);color:#fff}
.btn.sm{padding:9px 13px;font-size:13px;border-radius:10px}
.btn.wide{width:100%}

/* Barra pegajosa de búsqueda + categorías */
.sticky{position:sticky;top:calc(56px + env(safe-area-inset-top,0px));z-index:30;background:var(--cream);padding:8px 0 6px;margin:0 -14px;padding-left:14px;padding-right:14px}
.searchbar{width:100%;padding:12px 14px;border-radius:12px}
.chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-top:8px;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:8px 14px;font-size:12.5px;font-weight:700;color:var(--muted);white-space:nowrap;flex:none}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ===== Tarjeta de insumo (reemplaza la tabla) ===== */
.seccion{font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:800;color:var(--muted);margin:18px 0 8px;padding-left:2px}
.ic{
  background:#fff;border:1px solid var(--line);border-left:4px solid var(--line);
  border-radius:12px;padding:12px 12px 12px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);
}
.ic.out{border-left-color:var(--fresa)}
.ic.low{border-left-color:var(--amber)}
.ic.ok{border-left-color:var(--leaf)}
.ic .txt{flex:1;min-width:0}
.ic .nm{font-weight:700;font-size:15px;line-height:1.25;word-break:break-word}
.ic .meta{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ic .flag{font-size:11px;font-weight:700;margin-top:4px;line-height:1.35}
.ic .flag.amb{color:var(--amber)}
.ic .flag.red{color:var(--fresa)}
.pill{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.pill.ok{background:#E6F4EC;color:var(--leaf)}
.pill.low{background:#FDF1DF;color:var(--amber)}
.pill.out{background:#FCE7EB;color:var(--fresa-dark)}
.pill.sug{background:#EEF4F8;color:var(--azul)}

/* Stepper grande, para el pulgar */
.st2{display:flex;align-items:center;gap:0;flex:none}
.st2 button{
  width:42px;height:42px;border:1px solid var(--line);background:#fff;
  font-size:21px;font-weight:700;color:var(--fresa);
  display:flex;align-items:center;justify-content:center;
}
.st2 button:first-child{border-radius:11px 0 0 11px}
.st2 button:last-child{border-radius:0 11px 11px 0}
.st2 button:active{background:var(--cream)}
.st2 input{
  width:58px;height:42px;border:1px solid var(--line);border-left:none;border-right:none;
  text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:16px;
  border-radius:0;padding:0;
}
.st2 input:focus{outline:none;background:#FFF3F5}
.st2.tiene input{background:#FFF3F5;color:var(--fresa)}

/* ===== Comanda: barra flotante + hoja ===== */
.cbar{
  position:fixed;left:0;right:0;bottom:calc(60px + var(--safe-b));z-index:44;
  background:var(--ink);color:#fff;padding:12px 14px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 -6px 24px -10px rgba(0,0,0,.5);
}
.cbar .inner{max-width:760px;margin:0 auto;width:100%;display:flex;align-items:center;gap:12px}
.cbar .info{flex:1;min-width:0}
.cbar .info b{display:block;font-size:14px}
.cbar .info span{font-size:11.5px;color:#C8B3B8}
.cbar .btn{padding:11px 16px;font-size:14px}

.sheet{position:fixed;inset:0;z-index:60;display:none}
.sheet.on{display:block}
.sheet .bg{position:absolute;inset:0;background:rgba(43,26,31,.5)}
.sheet .panel{
  position:absolute;left:0;right:0;bottom:0;background:#fff;
  border-radius:20px 20px 0 0;max-height:88dvh;display:flex;flex-direction:column;
  padding-bottom:var(--safe-b);
}
.sheet .grab{width:38px;height:4px;background:var(--line);border-radius:2px;margin:10px auto 4px}
.sheet .shead{padding:8px 18px 12px;border-bottom:2px dashed var(--line);text-align:center}
.sheet .shead h3{font-family:'Instrument Serif',serif;font-size:21px;font-weight:400}
.sheet .shead .m{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.08em}
.sheet .sbody{overflow:auto;padding:4px 18px;flex:1}
.cl{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px dotted var(--line)}
.cl:last-child{border-bottom:none}
.cl .i{flex:1;min-width:0}
.cl .i b{display:block;font-size:14.5px;font-weight:600}
.cl .i span{font-size:11px;color:var(--muted)}
.cl .x{color:#CFB6BC;font-size:22px;padding:4px 8px}
.sheet .sfoot{padding:14px 18px;border-top:2px dashed var(--line);background:#FFFBFA}

/* ===== Pedidos ===== */
.ped{padding:14px;margin-bottom:10px}
.ped .hd{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ped .hd b{font-size:15px}
.ped .hd .mono{font-size:11px;color:var(--muted)}
.stt{padding:4px 9px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.stt.enviado{background:#FDF1DF;color:var(--amber)}
.stt.aprobado{background:#E4F1F7;color:var(--azul)}
.stt.surtido,.stt.recibido{background:#E6F4EC;color:var(--leaf)}
.stt.cancelado{background:#F1EBEC;color:var(--muted)}
.lines{margin-top:10px;border-top:1px solid var(--line);padding-top:6px;max-height:340px;overflow:auto}
.pl{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px dotted #F5E5E8;font-size:14px}
.pl:last-child{border-bottom:none}
.pl .n{flex:1;min-width:0;font-weight:600;line-height:1.3}
.pl input{width:64px;padding:8px;text-align:center}
.provhead{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--azul);padding:10px 0 2px;border-top:1px dashed var(--line);margin-top:6px}
.pl .x{color:#CFB6BC;font-size:20px;padding:2px 6px;flex:none}
.pl.compra{flex-wrap:wrap;align-items:flex-start}
.pl .sub2{display:block;font-size:11px;color:var(--muted);font-weight:500;font-family:'IBM Plex Mono',monospace;margin-top:2px}
.pl .campos{display:flex;gap:8px;align-items:flex-end;flex:none}
.pl .campos label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:var(--muted);margin-bottom:3px}
.pl .campos input{width:74px;padding:9px 6px;text-align:center}
.pl .campos input.precio{border-color:var(--azul);background:#F5FAFC}
.addline{display:flex;gap:6px;align-items:center;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
.addline select{flex:1;min-width:0;padding:10px;font-size:13px}
.addline input{width:64px;padding:10px;text-align:center}

/* Modo conteo */
.cnthead{display:flex;align-items:center;gap:10px;margin:18px 0 4px}
.cnthead .cprog{font-family:'Instrument Serif',serif;font-size:24px;margin-top:2px}
.cnthead .cprog b{color:var(--fresa)}
.cnthead .btn{margin-left:auto;flex:none}
.cnt{
  background:#fff;border:1px solid var(--line);border-radius:12px;
  padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;
}
.cnt.hecho{border-color:var(--leaf);background:#F6FCF8}
.cnt .ctxt{flex:1;min-width:0}
.cnt .nm{font-weight:700;font-size:15px;line-height:1.25}
.cnt .cmeta{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cdif{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;padding:2px 7px;border-radius:20px}
.cdif.up{background:#E6F4EC;color:var(--leaf)}
.cdif.dn{background:#FCE7EB;color:var(--fresa-dark)}
.cdif.eq{background:#F1EBEC;color:var(--muted)}
.cinput{
  width:78px;height:46px;text-align:center;flex:none;
  font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:18px;
  border:2px solid var(--line);border-radius:11px;
}
.cnt.hecho .cinput{border-color:var(--leaf);color:var(--leaf)}
.cuni{font-size:11px;color:var(--muted);font-weight:700;width:32px;flex:none}
.cntbar{
  position:fixed;left:0;right:0;bottom:calc(60px + var(--safe-b));z-index:44;
  background:var(--ink);padding:12px 14px;box-shadow:0 -6px 24px -10px rgba(0,0,0,.5);
}
.cntbar .inner{max-width:760px;margin:0 auto;display:flex;gap:10px}
.cntbar .btn{flex:1}
.cntbar .btn.ghost{flex:0 0 130px}

/* Arranque: nunca se ha contado */
.arranque{
  background:#fff;border:2px dashed var(--fresa);border-radius:16px;
  padding:16px;margin-bottom:10px;font-size:13px;line-height:1.6;color:var(--muted);
}
.arranque b{display:block;color:var(--ink);font-size:16px;margin-bottom:6px}

/* Empaque: paquetes vs unidades sueltas */
.stepwrap{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex:none}
.packbtns{display:flex;gap:5px}
.packbtns button{
  font-size:10.5px;font-weight:700;color:var(--azul);
  background:#EEF4F8;border:1px solid #D3E4EE;border-radius:8px;padding:5px 8px;white-space:nowrap;
}
.packbtns button:active{background:#DCEAF2}
.packbtns button:disabled{opacity:.35}
.packinfo{font-size:11px;color:var(--azul);font-weight:700;margin-top:4px;font-family:'IBM Plex Mono',monospace}
.cpack{display:flex;gap:6px;flex:none}
.cpack label{display:block;font-size:8.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:800;color:var(--muted);margin-bottom:3px;text-align:center}
.cinput.chico{width:62px;height:44px;font-size:16px}
.packnote{
  font-size:11px;color:var(--azul);background:#F5FAFC;border-radius:9px;
  padding:8px 10px;margin-top:10px;line-height:1.5;
}
.chk{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}
.chk input{width:17px;height:17px;accent-color:var(--fresa)}
#altabox{display:none}
#altabox.on{display:block}

/* Barra de exportar */
.expbar{display:flex;gap:8px;margin:10px 0 0;flex-wrap:wrap}
.expbar .btn{flex:1;white-space:nowrap}
.expbar.sm .btn{flex:1;font-size:12px;padding:8px 10px}

/* Aviso dentro de un pedido aprobado */
.aviso{
  margin-top:10px;padding:11px 12px;border-radius:11px;
  background:#FCE7EB;border-left:3px solid var(--fresa);
  font-size:12.5px;line-height:1.6;
}
.aviso b{display:block;color:var(--fresa-dark);margin-bottom:3px;font-size:13px}
.aviso span{display:block;color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:11.5px}
.aviso.ok{background:#E6F4EC;border-left-color:var(--leaf)}
.aviso.ok b{color:var(--leaf);margin-bottom:0}

/* Pedido diario (fresa) */
.diario{
  background:linear-gradient(160deg, #E8294B 0%, #B31A38 100%);
  color:#fff;border-radius:16px;padding:16px;margin-bottom:6px;
  box-shadow:0 10px 30px -14px rgba(232,41,75,.75);
}
.diario .dhead{margin-bottom:12px}
.dfila{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.12);border-radius:12px;padding:10px 12px;margin-bottom:8px;
}
.dfila .dtxt{flex:1;min-width:0}
.dfila .dtxt b{display:block;font-size:17px}
.dfila .dtxt span{font-size:12px;color:rgba(255,255,255,.75)}
.diario .st2 button{background:rgba(255,255,255,.9);border-color:transparent;color:var(--fresa)}
.diario .st2 input{background:#fff;border-color:transparent;color:var(--ink)}
.diario .btn{background:#fff;color:var(--fresa-dark)}
.diario .btn:active{background:#FFE9ED}
.dnota{font-size:11.5px;color:rgba(255,255,255,.8);margin-top:9px;line-height:1.45}
.pill.dia{background:#FFE3E9;color:var(--fresa-dark)}

/* Panel de necesidades del comisariato */
.provbar{
  background:var(--ink);color:#fff;padding:10px 14px;
  display:flex;align-items:center;gap:10px;
}
.provbar b{font-size:14px}
.provbar .mono{margin-left:auto;font-size:11px;color:#C8B3B8}
.nfila{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #FAEDEF}
.nfila:last-child{border-bottom:none}
.nfila.dia{background:#FFF6F8}
.nfila .ntxt{flex:1;min-width:0}
.nfila .nm{font-weight:700;font-size:15px}
.nfila .nwhy{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.55}
.nfila .nwhy b{color:var(--ink)}
.ncomprar{text-align:center;flex:none;background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:8px 12px;min-width:66px}
.ncant{display:block;font-size:20px;font-weight:700;color:var(--fresa);line-height:1.1}
.nuni{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase}
.acciones{display:flex;gap:8px;width:100%;margin-top:10px}
.acciones .btn{flex:1}

/* ===== Panel ===== */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi{padding:14px}
.kpi .k{font-family:'Instrument Serif',serif;font-size:30px;line-height:1.1;margin-top:2px}
.kpi .k.red{color:var(--fresa)}
.kpi.full{grid-column:1 / -1}
.focos{margin-top:7px;font-size:12.5px;color:var(--muted);line-height:1.7}
.focos b{color:var(--ink)}
.mv{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid #FAEDEF;font-size:13.5px;align-items:baseline}
.mv:last-child{border-bottom:none}
.mv .t{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
.mv .d{flex:1;line-height:1.35}
.mv .q{font-family:'IBM Plex Mono',monospace;font-weight:700}
.mv .q.up{color:var(--leaf)}
.mv .q.dn{color:var(--fresa)}

/* Catálogo: campos apilados */
.ce{margin-bottom:10px;padding:12px}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.cgrid label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:800;color:var(--muted);display:block;margin-bottom:4px}
.cgrid input{width:100%;padding:9px}
.cgrid .niv{background:#FFFAF9}

#toast{
  position:fixed;left:14px;right:14px;bottom:calc(130px + var(--safe-b));
  background:var(--ink);color:#fff;padding:14px 18px;border-radius:13px;
  font-size:14px;font-weight:600;z-index:80;
  box-shadow:0 10px 30px -10px rgba(0,0,0,.5);text-align:center;max-width:520px;margin:0 auto;
  opacity:0;visibility:hidden;pointer-events:none;transform:translateY(14px);

<body>

<!-- ===== Login ===== -->
<div id="login">
  <div class="loginbox">
    <div class="big">🍓 Lady <em>Fresa</em></div>
    <div class="sublog">Inventario y requerimientos</div>

      <div class="hright">

</div>

  <div class="panel">
    <div class="grab"></div>

      <h3 id="sh-title">Comanda de pedido</h3>
      <div class="m" id="sh-meta"></div>
    </div>

      <div class="row" style="justify-content:space-between;margin-bottom:12px">
        <span class="eyebrow" id="sh-costlbl">Costo estimado</span>

      </div>
      <button class="btn wide" id="sh-send" onclick="enviarPedido()">Enviar pedido</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ===== Supabase ===== */
const SB_URL = 'https://ngpumyxxxlafuzcsaepy.supabase.co';
const SB_KEY = 'sb_publishable_6Kma0iIJ6mFCK1A7YTDnRw_HKqxsLQv';
const db = window.supabase.createClient(SB_URL, SB_KEY);

const LOCS = {
  centro:    {n:'Comisariato (Moctezuma)', short:'Comisariato'},
  moctezuma: {n:'Tienda Moctezuma', short:'Moctezuma'},
  narvarte:  {n:'Tienda Narvarte',  short:'Narvarte'},
  balbuena:  {n:'Tienda Balbuena',  short:'Balbuena'},
};
const TIENDAS = ['moctezuma','narvarte','balbuena'];

let CAT=[], INV={}, NIV={}, MOV=[], REQ=[], draft={};
let sesion=null, who='moctezuma', tab='inv', q='', filtroCat='', cargando=false;
let modoConteo=false, conteo={};   // conteo = capturas pendientes de guardar

const hoy = () => new Date().toISOString().slice(0,10);
const money = n => '$' + (Math.round(n*100)/100).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
const item = id => CAT.find(i => i.id === id);
const stock = (loc,id) => (INV[loc] && INV[loc][id]) || 0;
const isDir = () => sesion && sesion.rol === 'direccion';
const verCentro = () => who === 'centro';
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');

const nivel = (loc,id) => {
  const it = item(id); if (!it) return {min:0,par:0};
  if (loc === 'centro') return {min:Number(it.min_com), par:Number(it.par_com)};
  const n = NIV[loc] && NIV[loc][id];
  return {min: n ? Number(n.min_nivel) : 0, par: n ? Number(n.par_nivel) : 0};
};
function estado(loc,id){
  const {min,par} = nivel(loc,id);
  if (par === 0) return 'na';
  const s = stock(loc,id);
  if (s <= 0) return 'out';
  if (s <= min) return 'low';
  return 'ok';
}
const etiqueta = e => e==='out'?'Agotado' : e==='low'?'Bajo' : e==='na'?'—' : 'OK';

/* ===== Empaque: se compra por paquete, se cuenta y se usa por unidad ===== */
const tienePack = i => Number(i.factor) > 1 && i.empaque;
const aPacks = (i, u) => Math.floor(u / Number(i.factor));       // 27 botellas -> 2 paquetes
const sueltas = (i, u) => u % Number(i.factor);                  //            -> 3 sueltas
const desdePack = (i, p, s) => Math.max(0, (Number(p)||0) * Number(i.factor) + (Number(s)||0));
/* Cómo se lee una cantidad: "27 botellas (2 paquetes + 3)" */
function leerCant(i, u){
  if (!tienePack(i)) return `${u} ${i.unidad}`;
  const p = aPacks(i,u), s = sueltas(i,u);
  if (!p) return `${u} ${i.unidad}`;
  return `${u} ${i.unidad} (${p} ${i.empaque}${p>1?'s':''}${s ? ' + ' + s : ''})`;
}
function comprometido(id){
  return REQ.filter(r => r.tipo==='tienda' && ['enviado','aprobado'].includes(r.estado))
    .reduce((a,r) => { const l = r.lineas.find(x => x.insumo_id === id); return a + (l ? Number(l.aprob||0) : 0); }, 0);
}
const dispReal = id => stock('centro',id) - comprometido(id);
const sugerir = (loc,i) => loc === 'centro'
  ? Math.max(0, Number(i.par_com) - dispReal(i.id))
  : Math.max(0, nivel(loc,i.id).par - stock(loc,i.id));

/* ===== Login ===== */
document.getElementById('lg-suc').innerHTML = Object.keys(LOCS)
  .map(l => `<option value="${l}">${LOCS[l].n}</option>`).join('');

async function entrar(){
  const suc = document.getElementById('lg-suc').value;
  const pin = document.getElementById('lg-pin').value.trim();
  const err = document.getElementById('lg-err');
  err.textContent = '';
  if (!pin){ err.textContent = 'Escribe tu PIN.'; return; }
  const { data, error } = await db.from('lfi_accesos').select('*').eq('sucursal',suc).eq('pin',pin).maybeSingle();
  if (error){ err.textContent = 'No hay conexión con la base.'; return; }
  if (!data){ err.textContent = 'PIN incorrecto para esa sucursal.'; document.getElementById('lg-pin').value=''; return; }
  sesion = {sucursal:data.sucursal, rol:data.rol};
  sessionStorage.setItem('lfi_sesion', JSON.stringify(sesion));
  who = sesion.sucursal;
  await arrancar();
}
function salir(){
  sessionStorage.removeItem('lfi_sesion'); sesion = null;
  document.getElementById('shell').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('lg-pin').value = '';
}
async function arrancar(){
  document.getElementById('login').style.display = 'none';
  document.getElementById('shell').style.display = 'block';
  tab = 'inv';
  await cargar(); render();
}

/* ===== Carga ===== */
function setDot(e){ const d = document.getElementById('dot'); if (d) d.className = 'dot' + (e ? ' '+e : ''); }

async function cargar(silencioso){
  if (cargando) return;
  cargando = true;
  if (!silencioso) setDot('busy');
  try{
    const [ins,stk,niv,peds,lins,movs] = await Promise.all([
      db.from('lfi_insumos').select('*').eq('activo',true).order('categoria').order('nombre'),
      db.from('lfi_stock').select('*'),
      db.from('lfi_niveles').select('*'),
      db.from('lfi_pedidos').select('*').order('created_at',{ascending:false}).limit(50),
      db.from('lfi_pedido_lineas').select('*'),
      db.from('lfi_movimientos').select('*').eq('sucursal',who).order('created_at',{ascending:false}).limit(150),
    ]);
    const bad = [ins,stk,niv,peds,lins,movs].find(r => r.error);
    if (bad) throw bad.error;
    CAT = ins.data;
    INV = {}; NIV = {};
    Object.keys(LOCS).forEach(l => { INV[l] = {}; NIV[l] = {}; });
    stk.data.forEach(s => { if (INV[s.sucursal]) INV[s.sucursal][s.insumo_id] = Number(s.cantidad); });
    niv.data.forEach(n => { if (NIV[n.sucursal]) NIV[n.sucursal][n.insumo_id] = n; });
    REQ = peds.data.map(p => ({...p, lineas: lins.data.filter(l => l.pedido_id === p.id)}));
    MOV = movs.data;
    setDot('');
  } catch(e){
    console.error(e); setDot('err'); toast('Sin conexión con la base de datos.');
  }
  cargando = false;
}
async function sincronizar(){ await cargar(); render(); toast('Actualizado'); }

/* ===== Acciones ===== */
async function ajustar(loc,id,val){
  const nueva = Math.max(0, Number(val)||0);
  if (nueva === stock(loc,id)) return;
  INV[loc][id] = nueva; render();
  setDot('busy');
  const { error } = await db.rpc('lfi_ajustar', {p_suc:loc, p_insumo:id, p_nueva:nueva, p_por:LOCS[sesion.sucursal].short});
  if (error) toast('No se guardó. Revisa tu internet.');
  await cargar(true); render();
}
function addDraft(id,c){
  const v = Math.max(0, Number(c)||0);
  if (v === 0) delete draft[id]; else draft[id] = v;
  render();
}
function autollenar(){
  draft = {};
  CAT.forEach(i => { const s = sugerir(who,i); if (s > 0) draft[i.id] = s; });
  const n = Object.keys(draft).length;
  toast(n ? `Se llenaron ${n} insumos con lo que te falta` : 'Todo está en nivel. No hace falta pedir nada.');
  render();
  if (n) abrirSheet();
}
async function enviarPedido(){
  const lineas = Object.entries(draft).filter(([,c]) => c > 0);
  if (!lineas.length) return;
  const tipo = verCentro() ? 'compra' : 'tienda';
  cerrarSheet(); setDot('busy');
  const { data:ped, error } = await db.from('lfi_pedidos')
    .insert({tipo, sucursal:who, fecha:hoy(), estado: tipo==='compra' ? 'aprobado' : 'enviado'})
    .select().single();
  if (error){ toast('No se pudo enviar el pedido.'); setDot('err'); return; }
  const { error:e2 } = await db.from('lfi_pedido_lineas')
    .insert(lineas.map(([id,c]) => ({pedido_id:ped.id, insumo_id:id, cant:c, aprob:c})));
  if (e2) toast('El pedido se creó pero fallaron las líneas.');
  draft = {};
  toast(tipo === 'compra' ? 'Orden de compra generada' : '✅ Pedido enviado al comisariato');
  tab = tipo === 'compra' ? 'com' : 'ped';
  await cargar(true); render();
}
async function setEstado(rid,est){
  setDot('busy');
  const { error } = await db.from('lfi_pedidos').update({estado:est}).eq('id',rid);
  toast(error ? 'No se pudo actualizar.' : (est==='aprobado' ? 'Pedido aprobado' : 'Pedido cancelado'));
  await cargar(true); render();
}
async function setLinea(lid,val){
  setDot('busy');
  await db.from('lfi_pedido_lineas').update({aprob: Math.max(0, Number(val)||0)}).eq('id',lid);
  await cargar(true); render();
}
/* La tienda corrige su propio pedido: mueve cant y aprob juntos */
async function setLineaTienda(lid,val){
  const v = Math.max(0, Number(val)||0);
  setDot('busy');
  await db.from('lfi_pedido_lineas').update({cant:v, aprob:v}).eq('id',lid);
  await cargar(true); render();
}
/* En la compra se captura por EMPAQUE; por dentro todo vive en unidades sueltas */
async function setLineaPack(lid, packs){
  const l = REQ.flatMap(r => r.lineas).find(x => x.id === lid);
  const i = item(l.insumo_id);
  const u = Math.max(0, (Number(packs)||0) * Number(i.factor));
  setDot('busy');
  await db.from('lfi_pedido_lineas').update({aprob:u}).eq('id',lid);
  await cargar(true); render();
}
/* Precio que te da el proveedor por paquete -> se guarda por unidad */
async function setPrecioPack(lid, precioPack){
  const l = REQ.flatMap(r => r.lineas).find(x => x.id === lid);
  const i = item(l.insumo_id);
  const p = Number(precioPack);
  setDot('busy');
  await db.from('lfi_pedido_lineas')
    .update({precio: p > 0 ? p / Number(i.factor) : null}).eq('id',lid);
  await cargar(true); render();
}
async function setPrecio(lid,val){
  setDot('busy');
  const p = Number(val);
  await db.from('lfi_pedido_lineas').update({precio: p > 0 ? p : null}).eq('id',lid);
  await cargar(true); render();
}
async function borrarLinea(lid){
  setDot('busy');
  await db.from('lfi_pedido_lineas').delete().eq('id',lid);
  toast('Insumo quitado del pedido');
  await cargar(true); render();
}
async function agregarLinea(rid){
  const sel = document.getElementById('add-' + rid);
  const cant = Number(document.getElementById('addq-' + rid).value) || 0;
  if (!sel.value || cant <= 0){ toast('Elige el insumo y la cantidad.'); return; }
  const r = REQ.find(x => x.id === rid);
  if (r.lineas.some(l => l.insumo_id === sel.value)){ toast('Ese insumo ya está en el pedido. Cámbiale la cantidad.'); return; }
  setDot('busy');
  await db.from('lfi_pedido_lineas').insert({pedido_id:rid, insumo_id:sel.value, cant, aprob:cant});
  toast('Insumo agregado');
  await cargar(true); render();
}
/* Deshacer un pedido ya surtido / una compra ya recibida */
async function revertir(rid){
  if (!confirm('Esto va a deshacer el movimiento de inventario y dejar el pedido editable otra vez. ¿Le seguimos?')) return;
  setDot('busy');
  const { error } = await db.rpc('lfi_revertir', {p_pedido:rid, p_por:LOCS[sesion.sucursal].short});
  toast(error ? 'No se pudo corregir: '+error.message : 'Deshecho. Ya lo puedes corregir y volver a surtir.');
  await cargar(true); render();
}
const precioLinea = l => { const i = item(l.insumo_id); return Number(l.precio ?? i?.costo ?? 0); };

/* ===== Qué necesita comprar el comisariato, y por qué ===== */
function necesidades(){
  return CAT.map(i => {
    const piden = {};
    TIENDAS.forEach(t => {
      const n = REQ.filter(r => r.tipo==='tienda' && r.sucursal===t && ['enviado','aprobado'].includes(r.estado))
        .reduce((a,r) => { const l = r.lineas.find(x => x.insumo_id === i.id); return a + (l ? Number(l.aprob||0) : 0); }, 0);
      if (n > 0) piden[t] = n;
    });
    const pedido = Object.values(piden).reduce((a,b) => a+b, 0);
    const hay = stock('centro', i.id);
    const comprar = Math.max(0, Number(i.par_com) - (hay - pedido));
    return {i, piden, pedido, hay, comprar};
  }).filter(n => n.comprar > 0)
    .sort((a,b) => (b.i.diario - a.i.diario) || (b.pedido - a.pedido));
}

/* ===== Exportar ===== */
function descargarCSV(nombre, filas){
  const csv = '\ufeff' + filas.map(f => f.map(c => {
    const s = String(c ?? '');
    return /[",;\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
  }).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));
  a.download = nombre + '.csv';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  toast('Descargado: ' + nombre + '.csv');
}
async function copiar(texto){
  try{ await navigator.clipboard.writeText(texto); toast('Copiado. Pégalo en WhatsApp.'); }
  catch(e){
    const t = document.createElement('textarea');
    t.value = texto; t.style.position='fixed'; t.style.opacity='0';
    document.body.appendChild(t); t.select();
    try{ document.execCommand('copy'); toast('Copiado. Pégalo en WhatsApp.'); }
    catch(e2){ toast('No se pudo copiar. Usa el CSV.'); }
    document.body.removeChild(t);
  }
}
function textoPedido(r){
  const L = [`🍓 LADY FRESA · ${r.tipo==='compra' ? 'ORDEN DE COMPRA' : 'PEDIDO ' + LOCS[r.sucursal].short.toUpperCase()}`, r.fecha, ''];
  if (r.tipo === 'compra'){
    const porProv = {};
    r.lineas.forEach(l => { const i = item(l.insumo_id); if(!i) return;
      (porProv[i.proveedor || 'Sin proveedor'] = porProv[i.proveedor || 'Sin proveedor'] || []).push(l); });
    Object.entries(porProv).forEach(([p,ls]) => {
      L.push(`— ${p} —`);
      ls.forEach(l => { const i = item(l.insumo_id);
        L.push(`• ${i.nombre}: ${l.aprob} ${i.unidad}${l.precio ? ` @ ${money(l.precio)}` : ''}`); });
      L.push('');
    });
    L.push(`Total: ${money(r.lineas.reduce((a,l) => a + Number(l.aprob||0)*precioLinea(l), 0))}`);
  } else {
    r.lineas.forEach(l => { const i = item(l.insumo_id); if(!i) return;
      L.push(`• ${i.nombre}: ${l.surtido ?? l.aprob} ${i.unidad}`); });
  }
  return L.join('\n');
}
function csvPedido(r){
  const conPrecio = isDir();
  const filas = [conPrecio
    ? ['Insumo','Categoría','Unidad','Cantidad','Precio unitario','Subtotal','Proveedor']
    : ['Insumo','Categoría','Unidad','Cantidad']];
  r.lineas.forEach(l => { const i = item(l.insumo_id); if(!i) return;
    const c = Number(l.surtido ?? l.aprob), p = precioLinea(l);
    filas.push(conPrecio
      ? [i.nombre, i.categoria, i.unidad, c, p, (c*p).toFixed(2), i.proveedor || '']
      : [i.nombre, i.categoria, i.unidad, c]);
  });
  return filas;
}
function pedirEn(i, unidades){
  if (!tienePack(i)) return `${unidades} ${i.unidad}`;
  const p = Math.ceil(unidades / Number(i.factor));
  return `${p} ${i.empaque}${p!==1?'s':''} (de ${i.factor})`;
}
function textoProveedor(prov){
  const items = necesidades().filter(n => (n.i.proveedor || 'Sin proveedor asignado') === prov);
  const L = [`🍓 *Lady Fresa* — pedido del ${hoy()}`, '', `*${prov}*`, ''];
  items.forEach(n => L.push(`• ${n.i.nombre}: *${pedirEn(n.i, n.comprar)}*`));
  L.push('', 'Gracias!');
  return L.join('\n');
}
function textoNecesidades(){
  const ns = necesidades();
  const porProv = {};
  ns.forEach(n => { const p = n.i.proveedor || 'Sin proveedor'; (porProv[p] = porProv[p] || []).push(n); });
  const L = ['🍓 LADY FRESA · LO QUE HAY QUE COMPRAR', hoy(), ''];
  Object.entries(porProv).forEach(([p,items]) => {
    L.push(`— ${p} —`);
    items.forEach(n => L.push(`• ${n.i.nombre}: ${n.comprar} ${n.i.unidad}`));
    L.push('');
  });
  return L.join('\n');
}
function csvNecesidades(){
  const filas = [['Insumo','Proveedor','Unidad','Moctezuma pide','Narvarte pide','Balbuena pide','Total pedido','Hay en comisariato','Par comisariato','COMPRAR']];
  necesidades().forEach(n => filas.push([
    n.i.nombre, n.i.proveedor || '', n.i.unidad,
    n.piden.moctezuma || 0, n.piden.narvarte || 0, n.piden.balbuena || 0,
    n.pedido, n.hay, n.i.par_com, n.comprar,
  ]));
  return filas;
}
function csvInventario(loc){
  const conPrecio = isDir();
  const filas = [conPrecio
    ? ['Insumo','Categoría','Unidad','Existencia','Mínimo','Par','Estado','Costo unitario','Valor']
    : ['Insumo','Categoría','Unidad','Existencia','Mínimo','Par','Estado']];
  CAT.forEach(i => {
    const s = stock(loc,i.id), n = nivel(loc,i.id), e = estado(loc,i.id);
    if (n.par === 0 && !s) return;
    filas.push(conPrecio
      ? [i.nombre, i.categoria, i.unidad, s, n.min, n.par, etiqueta(e), i.costo, (s*Number(i.costo)).toFixed(2)]
      : [i.nombre, i.categoria, i.unidad, s, n.min, n.par, etiqueta(e)]);
  });
  return filas;
}

/* ===== Pedido diario (la fresa se pide todos los días) ===== */
async function enviarDiario(){
  const diarios = CAT.filter(i => i.diario);
  const lineas = diarios.filter(i => (draft[i.id] || 0) > 0).map(i => [i.id, draft[i.id]]);
  if (!lineas.length){ toast('Pon cuánta fresa necesitas hoy.'); return; }
  setDot('busy');
  const { data:ped, error } = await db.from('lfi_pedidos')
    .insert({tipo:'tienda', sucursal:who, fecha:hoy(), estado:'enviado'}).select().single();
  if (error){ toast('No se pudo enviar.'); setDot('err'); return; }
  await db.from('lfi_pedido_lineas')
    .insert(lineas.map(([id,c]) => ({pedido_id:ped.id, insumo_id:id, cant:c, aprob:c})));
  lineas.forEach(([id]) => delete draft[id]);
  toast('✅ Pedido del día enviado');
  await cargar(true); render();
}
function selectorInsumos(rid){
  const ya = (REQ.find(x => x.id === rid)?.lineas || []).map(l => l.insumo_id);
  const opts = CAT.filter(i => !ya.includes(i.id))
    .map(i => `<option value="${i.id}">${esc(i.nombre)} (${esc(i.unidad)})</option>`).join('');
  return `<div class="addline">
    <select id="add-${rid}"><option value="">+ Agregar insumo…</option>${opts}</select>
    <input type="number" inputmode="numeric" id="addq-${rid}" placeholder="Cant" value="1">

  </div>`;
}
async function surtir(rid){

  toast(error ? 'No se pudo surtir: '+error.message : 'Surtido. Inventarios actualizados.');
  await cargar(true); render();
}
async function recibir(rid){
  setDot('busy');
  const { error } = await db.rpc('lfi_recibir', {p_pedido:rid, p_por:LOCS[sesion.sucursal].short});
  toast(error ? 'No se pudo recibir: '+error.message : 'Mercancía recibida.');
  await cargar(true); render();
}
async function editarInsumo(id,campo,val){
  let v;
  if (campo === 'diario') v = !!val;
  else if (['nombre','categoria','unidad','proveedor','empaque'].includes(campo)) v = (val === '' ? null : val);
  else if (campo === 'factor') v = Math.max(1, Number(val)||1);
  else v = Number(val)||0;
  const patch = {}; patch[campo] = v;
  const it = item(id); if (it) it[campo] = v;
  setDot('busy');
  const { error } = await db.from('lfi_insumos').update(patch).eq('id',id);
  setDot(error ? 'err' : '');
  if (error) toast('No se guardó el cambio.');
  else if (['factor','empaque','diario'].includes(campo)) render();
}
async function editarNivel(loc,id,campo,val){
  const n = nivel(loc,id);
  const fila = {sucursal:loc, insumo_id:id, min_nivel:n.min, par_nivel:n.par};
  fila[campo] = Math.max(0, Number(val)||0);
  setDot('busy');
  const { error } = await db.from('lfi_niveles').upsert(fila, {onConflict:'sucursal,insumo_id'});
  if (error){ setDot('err'); toast('No se guardó el nivel.'); return; }
  if (!NIV[loc][id]) NIV[loc][id] = fila; else NIV[loc][id][campo] = fila[campo];
  setDot('');
}
async function borrarInsumo(id){
  setDot('busy');
  await db.from('lfi_insumos').update({activo:false}).eq('id',id);
  toast('Insumo dado de baja');
  await cargar(true); render();
}

/* ===== Hoja de comanda ===== */
function abrirSheet(){ pintarSheet(); document.getElementById('sheet').classList.add('on'); }
function cerrarSheet(){ document.getElementById('sheet').classList.remove('on'); }
function pintarSheet(){
  const dir = verCentro();
  const lineas = Object.entries(draft).filter(([,c]) => c > 0);
  const total = lineas.reduce((a,[id,c]) => a + c * Number(item(id).costo), 0);
  document.getElementById('sh-title').textContent = dir ? 'Orden de compra' : 'Comanda de pedido';
  document.getElementById('sh-meta').textContent = (dir ? 'Comisariato → proveedores' : LOCS[who].short + ' → comisariato') + ' · ' + hoy();
  document.getElementById('sh-send').textContent = dir ? 'Generar orden' : 'Enviar pedido';
  // Las tiendas no ven precios: solo cuántos insumos van
  document.getElementById('sh-costlbl').textContent = isDir() ? 'Costo estimado' : 'Insumos en la comanda';
  document.getElementById('sh-total').textContent = isDir() ? money(total) : String(lineas.length);
  document.getElementById('sh-body').innerHTML = lineas.length ? lineas.map(([id,c]) => {
    const i = item(id);
    return `<div class="cl">
      <div class="i"><b>${esc(i.nombre)}</b><span>${dir ? esc(i.proveedor||'Sin proveedor') : 'Del comisariato'}</span></div>
      <span class="mono" style="font-weight:700">${c} <span style="color:var(--muted);font-size:12px">${esc(i.unidad)}</span></span>
      <button class="x" onclick="addDraft('${id}',0);pintarSheet()" aria-label="Quitar">×</button>
    </div>`;
  }).join('') : '<div class="empty"><b>Comanda vacía</b>Marca cantidades en la lista.</div>';
}

/* ===== Modo conteo: para el inventario inicial y los conteos semanales ===== */
function toggleConteo(){
  if (modoConteo && Object.keys(conteo).length && !confirm('Tienes capturas sin guardar. ¿Salir sin guardarlas?')) return;
  modoConteo = !modoConteo;
  conteo = {}; q = ''; filtroCat = '';
  window.scrollTo(0,0); render();
  if (modoConteo) toast('Captura la cantidad y dale Enter para pasar al siguiente.');
}
function capturar(id, val){
  const v = val === '' ? undefined : Math.max(0, Number(val)||0);
  if (v === undefined) delete conteo[id]; else conteo[id] = v;
  refrescarProgreso();
}
function capturarPack(id){
  const i = item(id);
  const p = document.getElementById('p-'+id).value;
  const s = document.getElementById('s-'+id).value;
  if (p === '' && s === '') delete conteo[id];
  else conteo[id] = desdePack(i, p, s);
  refrescarProgreso();
}
function refrescarProgreso(){
  const h = document.getElementById('cnt-hechos');
  if (h) h.textContent = Object.keys(conteo).length;
  const b = document.getElementById('cnt-guardar');
  if (b){
    b.disabled = !Object.keys(conteo).length;
    b.textContent = `Guardar conteo (${Object.keys(conteo).length})`;
  }
}
function siguienteCampo(idx){
  const el = document.querySelector(`[data-cidx="${idx+1}"]`);
  if (el){ el.focus(); el.select(); el.scrollIntoView({block:'center', behavior:'smooth'}); }
  else { document.activeElement.blur(); toast('Terminaste la lista. Dale a Guardar conteo.'); }
}
async function guardarConteo(){
  const entradas = Object.entries(conteo);
  if (!entradas.length) return;
  setDot('busy');
  let fallas = 0;
  for (let k = 0; k < entradas.length; k += 8){
    const res = await Promise.all(entradas.slice(k, k+8).map(([id,v]) =>
      db.rpc('lfi_ajustar', {p_suc:who, p_insumo:id, p_nueva:v, p_por:LOCS[sesion.sucursal].short})));
    fallas += res.filter(r => r.error).length;
  }
  const n = entradas.length;
  conteo = {}; modoConteo = false;
  toast(fallas ? `Se guardaron ${n-fallas} de ${n}. Revisa tu internet y repite los que falten.`
               : `✅ Conteo guardado: ${n} ${n===1?'insumo':'insumos'}`);
  await cargar(true); render();
}
function llenarCerosNoContados(){
  const faltan = filtra().filter(i => conteo[i.id] === undefined);
  if (!faltan.length){ toast('Ya capturaste todo.'); return; }
  if (!confirm(`Vas a poner en CERO los ${faltan.length} insumos que no capturaste. Solo hazlo si de verdad no hay nada de ellos. ¿Le seguimos?`)) return;
  faltan.forEach(i => conteo[i.id] = 0);
  render();
  toast(`${faltan.length} insumos marcados en cero.`);
}

/* ===== Piezas de UI ===== */
const cats = () => [...new Set(CAT.map(i => i.categoria))];
function filtra(){
  return CAT.filter(i => {
    if (filtroCat && i.categoria !== filtroCat) return false;
    if (q && !(i.nombre + ' ' + i.categoria + ' ' + (i.proveedor||'')).toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  });
}
const barra = () => `<div class="sticky">
  <input type="text" class="searchbar" placeholder="Buscar insumo…" value="${esc(q)}"
    oninput="q=this.value;render();const el=document.querySelector('.searchbar');el.focus();el.setSelectionRange(el.value.length,el.value.length)">

    <button class="chip ${filtroCat===''?'on':''}" onclick="filtroCat='';render()">Todas</button>

</div>`;

function stepper(v, fnMenos, fnMas, fnSet, tiene){
  return `<div class="st2 ${tiene?'tiene':''}">

    <input type="number" inputmode="numeric" value="${v}" onchange="${fnSet}">

}

/* ===== Comisariato: qué comprar y por qué ===== */
function vComprar(){
  const ns = necesidades();
  const porProv = {};
  ns.forEach(n => { const p = n.i.proveedor || 'Sin proveedor asignado'; (porProv[p] = porProv[p] || []).push(n); });

  const bloques = Object.entries(porProv).map(([p, items]) => `
    <div class="card ce" style="padding:0;overflow:hidden;margin-bottom:12px">
      <div class="provbar">

      </div>
      ${items.map(n => { const pack = tienePack(n.i), f = Number(n.i.factor);
        const packs = pack ? Math.ceil(n.comprar / f) : n.comprar;
        return `<div class="nfila ${n.i.diario?'dia':''}">
        <div class="ntxt">
          <div class="nm">${esc(n.i.nombre)}${n.i.diario ? ' <span class="pill dia">diario</span>' : ''}</div>
          <div class="nwhy">
            ${Object.keys(n.piden).length
              ? 'Piden: ' + Object.entries(n.piden).map(([t,c]) => `<b>${LOCS[t].short} ${c}</b>`).join(' · ')
              : '<span style="color:var(--muted)">Nadie ha pedido; es para reponer tu par</span>'}
            <br><span class="mono">tienes ${n.hay} · par ${n.i.par_com} ${esc(n.i.unidad)}</span>
            ${pack ? `<br><span class="mono">faltan ${n.comprar} ${esc(n.i.unidad)} → ${packs} ${esc(n.i.empaque)}${packs!==1?'s':''}</span>` : ''}
          </div>
        </div>
        <div class="ncomprar">
          <span class="ncant mono">${packs}</span>
          <span class="nuni">${pack ? esc(n.i.empaque)+(packs!==1?'s':'') : esc(n.i.unidad)}</span>
        </div>
      </div>`; }).join('')}
      <div class="expbar sm" style="padding:10px 12px;background:#FFFAF9;margin:0">
        <button class="btn sm ghost" onclick="copiar(textoProveedor('${esc(p).replace(/'/g,"\\'")}'))">📋 Copiar</button>
        <button class="btn sm" onclick="generarOrden('${esc(p).replace(/'/g,"\\'")}')">Generar orden</button>
      </div>
    </div>`).join('');

  return `<h2 class="page">Comprar</h2>
  <p class="sub">Aquí llega solo lo que <b>no puedes cubrir con tu bodega</b>. Si una tienda pidió algo y ya lo tienes, no aparece: nomás lo surtes. <b>Cada proveedor genera su propia orden</b>, así la fresa la recibes hoy y los desechables cuando lleguen.</p>
  ${ns.length ? `
    <div class="expbar">
      <button class="btn sm ghost" onclick="descargarCSV('compras_${hoy()}', csvNecesidades())">⬇︎ Excel de todo</button>
      <button class="btn sm dark" onclick="generarTodas()">Generar todas las órdenes</button>
    </div>
    ${bloques}
  ` : `<div class="card empty"><b>No necesitas comprar nada</b>Lo que las tiendas pidieron ya lo tienes en bodega, y estás en tu nivel par. Ve a Pedidos y súrtelos.</div>`}`;
}

async function crearOrden(prov, items){
  const { data:ped, error } = await db.from('lfi_pedidos')
    .insert({tipo:'compra', sucursal:'centro', fecha:hoy(), estado:'aprobado', proveedor:prov}).select().single();
  if (error) return false;
  await db.from('lfi_pedido_lineas').insert(items.map(n => {
    // No se compran medias cajas: si trae empaque, se redondea al paquete completo de arriba
    const f = Number(n.i.factor);
    const c = tienePack(n.i) ? Math.ceil(n.comprar / f) * f : n.comprar;
    return {pedido_id: ped.id, insumo_id: n.i.id, cant: c, aprob: c};
  }));
  return true;
}

/* Una orden por proveedor: cada quien llega cuando llega */
async function generarOrden(prov){
  const items = necesidades().filter(n => (n.i.proveedor || 'Sin proveedor asignado') === prov);
  if (!items.length) return;
  setDot('busy');
  const ok = await crearOrden(prov, items);
  toast(ok ? 'Orden de ' + prov + ' generada' : 'No se pudo generar la orden.');
  tab = 'com';
  await cargar(true); render();
}

async function generarTodas(){
  const ns = necesidades();
  if (!ns.length) return;
  const porProv = {};
  ns.forEach(n => { const p = n.i.proveedor || 'Sin proveedor asignado'; (porProv[p] = porProv[p] || []).push(n); });
  setDot('busy');
  for (const [p, items] of Object.entries(porProv)) await crearOrden(p, items);
  toast(`Se generaron ${Object.keys(porProv).length} órdenes, una por proveedor.`);
  tab = 'com';
  await cargar(true); render();
}

function cbar(){
  const lineas = Object.entries(draft).filter(([,c]) => c > 0);
  if (tab !== 'req' || !lineas.length || verCentro()) return '';
  const total = lineas.reduce((a,[id,c]) => a + c * Number(item(id).costo), 0);
  return `<div class="cbar"><div class="inner">
    <div class="info"><b>${lineas.length} ${lineas.length===1?'insumo':'insumos'}</b>
      <span>${isDir() ? money(total) + ' estimado' : 'listos para enviar'}</span></div>
    <button class="btn ghost sm" onclick="abrirSheet()">Ver</button>
    <button class="btn" onclick="abrirSheet()">Enviar</button>
  </div></div>`;
}

function vPedidos(){
  const mios = REQ.filter(r => r.tipo === 'tienda' && (isDir() || r.sucursal === sesion.sucursal));
  if (!mios.length) return `<h2 class="page">Pedidos</h2>
    <div class="card empty"><b>Todavía no hay pedidos</b>Cuando una tienda envíe su requerimiento, aparece aquí.</div>`;

  const cards = mios.map(r => {
    // La tienda corrige el suyo mientras nadie lo haya aprobado.
    const miTienda = !isDir() && r.sucursal === sesion.sucursal && r.estado === 'enviado';
    // Dirección puede tocar cantidades mientras no esté surtido.
    const dirEdita = isDir() && ['enviado','aprobado'].includes(r.estado);
    const editable = miTienda || dirEdita;
    const total = r.lineas.reduce((a,l) => a + Number(l.aprob||0) * precioLinea(l), 0);

    const lines = r.lineas.map(l => {
      const i = item(l.insumo_id); if (!i) return '';
      const disp = stock('centro', l.insumo_id);
      const corto = ['enviado','aprobado'].includes(r.estado) && Number(l.aprob) > disp;
      const parcial = l.surtido != null && Number(l.surtido) < Number(l.cant);
      return `<div class="pl">
        <span class="n">${esc(i.nombre)}${corto ? `<br><span class="pill out">solo hay ${disp}</span>` : ''}</span>
        ${dirEdita ? `<span class="mono" style="color:var(--muted);font-size:11.5px">pidió ${l.cant}</span>` : ''}
        ${editable
          ? `<input type="number" inputmode="numeric" value="${l.aprob}" class="mono"
               onchange="${miTienda ? `setLineaTienda(${l.id},this.value)` : `setLinea(${l.id},this.value)`}">
             <span style="color:var(--muted);font-size:12px">${esc(i.unidad)}</span>
             <button class="x" onclick="borrarLinea(${l.id})" aria-label="Quitar">×</button>`
          : `<span class="mono" style="font-weight:700">${l.surtido ?? l.aprob} ${esc(i.unidad)}${parcial?' ⚠':''}</span>`}
      </div>`;
    }).join('');

    let acc = '';
    if (miTienda){
      acc = `<div class="acciones"><button class="btn sm ghost" onclick="setEstado('${r.id}','cancelado')">Cancelar pedido</button></div>`;
    } else if (isDir()){
      if (r.estado === 'enviado')  acc = `<div class="acciones"><button class="btn sm" onclick="setEstado('${r.id}','aprobado')">Aprobar</button><button class="btn sm ghost" onclick="setEstado('${r.id}','cancelado')">Cancelar</button></div>`;
      if (r.estado === 'aprobado'){
        // ¿Alcanza el comisariato para surtirlo completo?
        const faltan = r.lineas.filter(l => Number(l.aprob) > stock('centro', l.insumo_id));
        acc = faltan.length
          ? `<div class="aviso">
               <b>Te faltan ${faltan.length} ${faltan.length===1?'insumo':'insumos'} para surtir esto completo.</b>
               ${faltan.slice(0,4).map(l => { const i = item(l.insumo_id);
                 return `<span>• ${esc(i.nombre)}: piden ${l.aprob}, tienes ${stock('centro',l.insumo_id)}</span>`; }).join('')}
               ${faltan.length > 4 ? `<span>• +${faltan.length-4} más</span>` : ''}
             </div>
             <div class="acciones">
               <button class="btn sm" onclick="tab='req';window.scrollTo(0,0);render()">🛒 Ir a Comprar</button>
               <button class="btn sm ghost" onclick="surtir('${r.id}')">Surtir lo que hay</button>
             </div>`
          : `<div class="aviso ok"><b>✅ Tienes todo. Se puede surtir completo.</b></div>
             <div class="acciones"><button class="btn sm dark" onclick="surtir('${r.id}')">Marcar como surtido</button></div>`;
      }
      if (r.estado === 'surtido')  acc = `<div class="acciones"><button class="btn sm ghost" onclick="revertir('${r.id}')">↩︎ Deshacer y corregir</button></div>`;
      if (r.estado === 'cancelado') acc = `<div class="acciones"><button class="btn sm ghost" onclick="setEstado('${r.id}','enviado')">Reabrir</button></div>`;
    }

    return `<div class="card ped">
      <div class="hd">
        <b>${LOCS[r.sucursal].short}</b>
        <span class="stt ${r.estado}">${r.estado}</span>
        <span class="mono" style="margin-left:auto">${r.fecha}</span>
      </div>
      <div class="lines">${lines || '<div class="empty" style="padding:16px">Pedido vacío</div>'}</div>
      ${editable ? selectorInsumos(r.id) : ''}
      ${isDir() ? `<div class="row" style="justify-content:space-between;margin-top:10px;padding-top:9px;border-top:1px solid var(--line)">
        <span class="eyebrow">${r.estado==='surtido'?'Costo surtido':'Costo estimado'}</span>
        <span class="mono" style="font-weight:700">${money(total)}</span>
      </div>` : ''}
      <div class="expbar sm">
        <button class="btn sm ghost" onclick='copiar(textoPedido(REQ.find(x=>x.id==="${r.id}")))'>📋 Copiar</button>
        <button class="btn sm ghost" onclick='descargarCSV("pedido_${LOCS[r.sucursal].short}_${r.fecha}", csvPedido(REQ.find(x=>x.id==="${r.id}")))'>⬇︎ Excel</button>
      </div>
      ${acc}
    </div>`;
  }).join('');

  return `<h2 class="page">Pedidos</h2>
  <p class="sub">${isDir()
    ? 'Ajusta, aprueba y surte. Si te equivocaste después de surtir, dale <b>Deshacer y corregir</b>: el inventario regresa a como estaba.'
    : 'Mientras diga <b>enviado</b> lo puedes corregir: cambia cantidades, quita o agrega insumos. Una vez aprobado, pídele el cambio a dirección.'}</p>
  ${cards}`;
}

function vCompras(){
  const compras = REQ.filter(r => r.tipo === 'compra');
  if (!compras.length) return `<h2 class="page">Compras</h2>
    <div class="card empty"><b>Sin órdenes de compra</b>Genérala desde la pestaña Comprar.</div>`;

  const cards = compras.map(r => {
    const abierta = r.estado === 'aprobado' && isDir();
    const total = r.lineas.reduce((a,l) => a + Number(l.aprob||0) * precioLinea(l), 0);
    const porProv = {};
    r.lineas.forEach(l => { const i = item(l.insumo_id); if(!i) return;
      const p = i.proveedor || 'Sin proveedor asignado'; (porProv[p] = porProv[p] || []).push(l); });

    const bloques = Object.entries(porProv).map(([p,ls]) => `<div class="provhead">${esc(p)}</div>
      ${ls.map(l => { const i = item(l.insumo_id); const pu = precioLinea(l);
        const pack = tienePack(i), f = Number(i.factor);
        const cantPack = pack ? Math.round(Number(l.aprob) / f) : Number(l.aprob);
        const precioPack = pack ? pu * f : pu;
        return `<div class="pl compra">
          <span class="n">${esc(i.nombre)}
            <span class="sub2">${pack
              ? `${money(precioPack)} / ${esc(i.empaque)} de ${f} · ${l.aprob} ${esc(i.unidad)} · subtotal ${money(Number(l.aprob||0)*pu)}`
              : `${money(pu)} / ${esc(i.unidad)} · subtotal ${money(Number(l.aprob||0)*pu)}`}</span></span>
          ${abierta
            ? `<div class="campos">
                 <div><label>${pack ? esc(i.empaque)+'s' : 'Cant'}</label>
                   <input type="number" inputmode="decimal" value="${cantPack}" class="mono"
                     onchange="${pack ? `setLineaPack(${l.id},this.value)` : `setLinea(${l.id},this.value)`}"></div>
                 <div><label>Precio ${pack ? esc(i.empaque) : esc(i.unidad)}</label>
                   <input type="number" inputmode="decimal" step="0.01" value="${l.precio != null ? (pack ? +(l.precio*f).toFixed(2) : l.precio) : ''}"
                     placeholder="${pack ? +(Number(i.costo)*f).toFixed(2) : i.costo}" class="mono precio"
                     onchange="${pack ? `setPrecioPack(${l.id},this.value)` : `setPrecio(${l.id},this.value)`}"></div>
                 <button class="x" onclick="borrarLinea(${l.id})" aria-label="Quitar">×</button>
               </div>`
            : `<span class="mono" style="font-weight:700">${pack ? Math.round(Number(l.surtido ?? l.aprob)/f) + ' ' + esc(i.empaque) + 's' : (l.surtido ?? l.aprob) + ' ' + esc(i.unidad)}</span>`}
        </div>`; }).join('')}`).join('');

    let acc = '';
    if (isDir()){
      if (r.estado === 'aprobado') acc = `<div class="acciones"><button class="btn sm dark" onclick="recibir('${r.id}')">Recibir mercancía</button></div>`;
      if (r.estado === 'recibido') acc = `<div class="acciones"><button class="btn sm ghost" onclick="revertir('${r.id}')">↩︎ Deshacer y corregir</button></div>`;
    }

    return `<div class="card ped">
      <div class="hd">
        <b>${esc(r.proveedor || 'Orden de compra')}</b>
        <span class="stt ${r.estado}">${r.estado === 'aprobado' ? 'por recibir' : r.estado}</span>
        <span class="mono" style="margin-left:auto">${r.fecha}</span>
      </div>
      <div class="lines">${bloques || '<div class="empty" style="padding:16px">Orden vacía</div>'}</div>
      ${abierta ? selectorInsumos(r.id) : ''}
      <div class="row" style="justify-content:space-between;margin-top:10px;padding-top:9px;border-top:1px solid var(--line)">
        <span class="eyebrow">Total ${r.estado==='recibido'?'pagado':'de la compra'}</span>
        <span class="mono" style="font-weight:700;font-size:16px">${money(total)}</span>
      </div>
      <div class="expbar sm">
        <button class="btn sm ghost" onclick='copiar(textoPedido(REQ.find(x=>x.id==="${r.id}")))'>📋 Copiar para WhatsApp</button>
        <button class="btn sm ghost" onclick='descargarCSV("orden_${(r.proveedor||"compra").replace(/[^a-zA-Z0-9]/g,"_")}_${r.fecha}", csvPedido(REQ.find(x=>x.id==="${r.id}")))'>⬇︎ Excel</button>
      </div>
      ${acc}
    </div>`;
  }).join('');

  return `<h2 class="page">Compras</h2>
  <p class="sub">Captura el <b>precio real del día</b> en cada línea — la fresa nunca cuesta lo mismo. Al recibir, ese precio se guarda en la orden <b>y actualiza el costo del catálogo</b>. Si dejas el precio vacío, usa el último que se pagó.</p>
  ${cards}`;
}

  const valorTotal = Object.keys(LOCS).reduce((a,l) => a + CAT.reduce((b,i) => b + stock(l,i.id)*Number(i.costo), 0), 0);
  const noCubre = CAT.filter(i => comprometido(i.id) > stock('centro',i.id));

    const focos = CAT.filter(i => ['out','low'].includes(estado(l,i.id)));
    return `<div class="card kpi full">
      <span class="eyebrow">${LOCS[l].n}</span>

      <div class="focos">${focos.slice(0,4).map(i => `${estado(l,i.id)==='out'?'🔴':'🟠'} ${esc(i.nombre)}`).join('<br>') || '✅ Todo en nivel'}
      ${focos.length>4 ? `<br><b style="color:var(--fresa)">+${focos.length-4} más</b>` : ''}</div>

    <div class="card kpi"><span class="eyebrow">Por recibir</span><div class="k">${rec}</div></div>

  </div>
  ${noCubre.length ? `<div class="card kpi" style="border-left:4px solid var(--fresa);margin-bottom:12px">

    <div class="focos">${noCubre.slice(0,8).map(i => `🔴 <b>${esc(i.nombre)}</b> — piden ${comprometido(i.id)}, hay ${stock('centro',i.id)}`).join('<br>')}</div>
  </div>` : ''}
  <div class="kpis">${tarjetas}</div>`;

async function nuevoInsumo(){
  const v = id => document.getElementById(id).value.trim();
  const nombre = v('ni-nombre');
  if (!nombre){ toast('Ponle nombre al insumo'); return; }
  const factor = Math.max(1, Number(v('ni-factor')) || 1);
  const empaque = v('ni-empaque');
  const parT = Number(v('ni-par')) || 0;
  setDot('busy');
  const { data:ins, error } = await db.from('lfi_insumos').insert({
    nombre,
    categoria: v('ni-cat') || 'General',
    unidad:    v('ni-uni') || 'pza',
    empaque:   factor > 1 ? (empaque || 'paquete') : null,
    factor,
    costo:     Number(v('ni-costo')) || 0,
    proveedor: v('ni-prov') || null,
    diario:    document.getElementById('ni-diario').checked,
    par_com:   parT * 3,
    min_com:   Math.floor(parT * 3 * 0.4),
  }).select().single();
  if (error){ toast('No se pudo agregar el insumo.'); setDot('err'); return; }
  // Se le da nivel en las tres tiendas de una vez
  await db.from('lfi_niveles').insert(['moctezuma','narvarte','balbuena'].map(s => ({
    sucursal:s, insumo_id:ins.id, par_nivel:parT, min_nivel:Math.floor(parT*0.4),
  })));
  toast(nombre + ' agregado y disponible en las 3 tiendas');
  await cargar(true); render();
}

function vCatalogo(){
  const rows = filtra().map(i => {
    const n = nivel(who,i.id);
    const f = Number(i.factor);
    const nivelCampos = verCentro()
      ? `<div><label>Mín comisariato</label><input class="niv" type="number" inputmode="numeric" value="${i.min_com}" onchange="editarInsumo('${i.id}','min_com',this.value)"></div>
         <div><label>Par comisariato</label><input class="niv" type="number" inputmode="numeric" value="${i.par_com}" onchange="editarInsumo('${i.id}','par_com',this.value)"></div>`
      : `<div><label>Mín ${esc(LOCS[who].short)}</label><input class="niv" type="number" inputmode="numeric" value="${n.min}" onchange="editarNivel('${who}','${i.id}','min_nivel',this.value)"></div>
         <div><label>Par ${esc(LOCS[who].short)}</label><input class="niv" type="number" inputmode="numeric" value="${n.par}" onchange="editarNivel('${who}','${i.id}','par_nivel',this.value)"></div>`;
    return `<div class="card ce">
      <div class="row" style="gap:8px">
        <input type="text" value="${esc(i.nombre)}" style="flex:1;min-width:140px;font-weight:700" onchange="editarInsumo('${i.id}','nombre',this.value)">
        <label class="chk" title="Se pide todos los días">
          <input type="checkbox" ${i.diario?'checked':''} onchange="editarInsumo('${i.id}','diario',this.checked)"> diario
        </label>
        <button style="color:#CFB6BC;font-size:22px;padding:4px 8px" onclick="borrarInsumo('${i.id}')" aria-label="Dar de baja">×</button>
      </div>
      <div class="cgrid">
        <div><label>Unidad de uso</label><input type="text" value="${esc(i.unidad)}" onchange="editarInsumo('${i.id}','unidad',this.value)"></div>
        <div><label>Costo por ${esc(i.unidad)}</label><input type="number" inputmode="decimal" value="${i.costo}" onchange="editarInsumo('${i.id}','costo',this.value)"></div>
        <div><label>Se compra por</label><input type="text" value="${esc(i.empaque)}" placeholder="suelto" onchange="editarInsumo('${i.id}','empaque',this.value)"></div>
        <div><label>${esc(i.unidad)} por ${esc(i.empaque || 'empaque')}</label><input type="number" inputmode="numeric" value="${f}" onchange="editarInsumo('${i.id}','factor',this.value)"></div>
        <div style="grid-column:1 / -1"><label>Proveedor</label><input type="text" value="${esc(i.proveedor)}" placeholder="¿Quién lo surte?" onchange="editarInsumo('${i.id}','proveedor',this.value)"></div>
        ${nivelCampos}
      </div>
      ${f > 1 ? `<div class="packnote">Se compra por <b>${esc(i.empaque)}</b> de ${f} ${esc(i.unidad)}, pero se cuenta y se pide por <b>${esc(i.unidad)}</b> suelta.</div>` : ''}
    </div>`;
  }).join('');

  return `<h2 class="page">Catálogo</h2>
  <p class="sub">Los niveles que ves son los de <b>${LOCS[who].short}</b>${isDir()?' — cámbiate de sucursal arriba para editar otra':''}. Par en <b>0</b> = esa tienda no maneja el insumo.</p>
  <button class="btn wide" onclick="document.getElementById('altabox').classList.toggle('on')" style="margin-bottom:12px">+ Agregar insumo nuevo</button>
  <div class="card ce" id="altabox">
    <span class="eyebrow">Insumo nuevo</span>
    <div class="cgrid" style="margin-top:10px">
      <div style="grid-column:1 / -1"><label>Nombre</label><input type="text" id="ni-nombre" placeholder="Ej: Nutella"></div>
      <div><label>Categoría</label><input type="text" id="ni-cat" list="cats-list" value="Comestibles"></div>
      <div><label>Unidad de uso</label><input type="text" id="ni-uni" value="pza" placeholder="kg, pza, L…"></div>
      <div><label>Se compra por</label><input type="text" id="ni-empaque" placeholder="suelto / caja / paquete"></div>
      <div><label>Unidades por empaque</label><input type="number" inputmode="numeric" id="ni-factor" value="1"></div>
      <div><label>Costo por unidad</label><input type="number" inputmode="decimal" id="ni-costo" placeholder="0"></div>
      <div><label>Par por tienda</label><input type="number" inputmode="numeric" id="ni-par" value="1"></div>
      <div style="grid-column:1 / -1"><label>Proveedor</label><input type="text" id="ni-prov" placeholder="¿Quién lo surte?"></div>
      <div style="grid-column:1 / -1">
        <label class="chk"><input type="checkbox" id="ni-diario"> Se pide todos los días (sale hasta arriba en Pedir)</label>
      </div>
    </div>
    <datalist id="cats-list">${cats().map(c => `<option value="${esc(c)}">`).join('')}</datalist>
    <button class="btn wide" onclick="nuevoInsumo()" style="margin-top:12px">Agregar a las 3 tiendas</button>
    <div class="packnote">Se da de alta en las tres tiendas con el mismo par. Después lo ajustas tienda por tienda.</div>
  </div>
  ${barra()}
  ${rows || '<div class="card empty"><b>Sin resultados</b></div>'}`;
}

/* ===== Render ===== */
const ICONOS = {inv:'📦', req:'📝', ped:'🚚', com:'🛒', pan:'📊', mov:'🕓', cat:'⚙️'};
function render(){
  const pend = REQ.filter(r => r.tipo==='tienda' && r.estado==='enviado').length;
  const rec  = REQ.filter(r => r.tipo==='compra' && r.estado==='aprobado').length;
  const porComprar = isDir() ? necesidades().length : 0;

  const tabs = [['inv','Inventario',0], ['req', verCentro()?'Comprar':'Pedir', verCentro()?porComprar:0], ['ped','Pedidos', isDir()?pend:0]];
  if (isDir()) tabs.push(['com','Compras', rec], ['pan','Panel',0]);
  tabs.push(['mov','Historial',0]);
  if (isDir()) tabs.push(['cat','Catálogo',0]);

  const views = {inv:vInventario, req:vRequerimiento, ped:vPedidos, com:vCompras, pan:vPanel, mov:vMovimientos, cat:vCatalogo};
  if (!views[tab] || (['com','pan','cat'].includes(tab) && !isDir())) tab = 'inv';

  document.getElementById('ctxslot').innerHTML = isDir()
    ? `<select class="aqui" id="who">${Object.keys(LOCS).map(l => `<option value="${l}" ${who===l?'selected':''}>${LOCS[l].short}</option>`).join('')}</select>`
    : `<span class="aqui">${LOCS[sesion.sucursal].short}</span>`;
  if (isDir()) document.getElementById('who').onchange = async e => {
    who = e.target.value; draft = {}; q=''; filtroCat=''; tab='inv';
    await cargar(); render();
  };

  document.getElementById('nav').innerHTML = tabs.map(([k,n,p]) =>
    `<button class="${tab===k?'on':''}" onclick="tab='${k}';q='';window.scrollTo(0,0);render()">
      <span class="ic">${ICONOS[k]}</span>${n}${p?`<span class="pip">${p}</span>`:''}</button>`).join('');

  document.getElementById('app').innerHTML = views[tab]();
  document.getElementById('cbarslot').innerHTML = cbar();
}

let tt;
function toast(m){
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('on');
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('on'), 3200);

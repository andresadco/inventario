<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lady Fresa · Inventario y Requerimientos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --fresa:#E8294B; --fresa-dark:#B31A38;
  --ink:#2B1A1F; --muted:#8A7178;
  --cream:#FFF6F3; --card:#FFFFFF; --line:#F2DDE1;
  --leaf:#2F8F5B; --amber:#D98614;
  --shadow:0 1px 2px rgba(43,26,31,.06), 0 8px 24px -12px rgba(43,26,31,.18);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Archivo',system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;padding-bottom:40px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:inherit}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px}

/* ---- Login ---- */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.loginbox{width:100%;max-width:360px;text-align:center}
.loginbox .logo{font-family:'Instrument Serif',serif;font-size:38px;margin-bottom:6px}
.loginbox .logo em{color:var(--fresa);font-style:italic}
.loginbox .sublog{color:var(--muted);font-size:13px;margin-bottom:26px}
.loginbox .card{padding:22px}
.loginbox label{display:block;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.14em;font-weight:800;color:var(--muted);margin-bottom:6px}
.loginbox select,.loginbox input{width:100%;margin-bottom:14px;padding:12px}
.loginbox input{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:22px;letter-spacing:.5em;font-weight:600}
.loginerr{color:var(--fresa);font-size:12px;font-weight:700;margin-bottom:10px;min-height:16px}

header{background:var(--ink);color:#fff;padding:18px 0 0;position:sticky;top:0;z-index:50;box-shadow:0 6px 20px -14px rgba(0,0,0,.6)}
.brandrow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding-bottom:14px}
.logo{font-family:'Instrument Serif',serif;font-size:27px;line-height:1}
.logo em{color:var(--fresa);font-style:italic}
.ctx{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ctx label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#C8B3B8;font-weight:700}
.ctx select{background:#3D272D;border:1px solid #55393F;color:#fff;border-radius:9px;padding:8px 10px;font-size:13px;font-weight:600}
.aqui{background:#3D272D;border:1px solid #55393F;border-radius:9px;padding:8px 11px;font-size:13px;font-weight:700}
.sync{display:flex;align-items:center;gap:6px;font-size:11px;color:#C8B3B8;font-weight:600;padding:8px 10px;border-radius:9px;border:1px solid #55393F}
.sync:hover{background:#3D272D;color:#fff}
.dot{width:7px;height:7px;border-radius:50%;background:var(--leaf)}
.dot.busy{background:var(--amber)}
.dot.err{background:var(--fresa)}
.salir{font-size:11px;color:#8A7178;font-weight:700;padding:8px}
.salir:hover{color:#fff}
nav{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{padding:11px 15px;font-size:13px;font-weight:600;color:#C8B3B8;border-bottom:3px solid transparent;white-space:nowrap}
nav button:hover{color:#fff}
nav button.on{color:#fff;border-bottom-color:var(--fresa)}
nav button .pip{display:inline-block;min-width:17px;height:17px;line-height:17px;background:var(--fresa);color:#fff;border-radius:9px;font-size:10px;font-weight:800;margin-left:5px;padding:0 4px}

h2.page{font-family:'Instrument Serif',serif;font-size:29px;font-weight:400;margin:26px 0 3px}
p.sub{color:var(--muted);font-size:14px;margin-bottom:18px;max-width:780px;line-height:1.5}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.btn{background:var(--fresa);color:#fff;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;transition:.15s}
.btn:hover{background:var(--fresa-dark)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{background:var(--cream);border-color:var(--fresa)}
.btn.dark{background:var(--ink)}
.btn.dark:hover{background:#452c33}
.btn.sm{padding:7px 11px;font-size:12px;border-radius:8px}
.btn.wide{width:100%}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mono{font-family:'IBM Plex Mono',monospace}
.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.14em;font-weight:800;color:var(--muted)}
.empty{padding:44px 20px;text-align:center;color:var(--muted);font-size:14px}
.empty b{display:block;color:var(--ink);font-size:16px;margin-bottom:5px;font-weight:700}
input[type=text],input[type=number],input[type=password],select.f,select,textarea{border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;background:#fff}
input:focus,select:focus,textarea:focus{outline:2px solid var(--fresa);outline-offset:-1px;border-color:transparent}
.search{flex:1;min-width:160px}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

.flow{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:18px;flex-wrap:wrap}
.flow span{background:#fff;border:1px solid var(--line);border-radius:20px;padding:5px 12px}
.flow span.hi{background:var(--ink);color:#fff;border-color:var(--ink)}
.flow i{color:#D9C2C7;font-style:normal}

.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800;padding:11px 12px;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 12px;border-bottom:1px solid #FAEDEF;font-size:14px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:#FFFAF9}
.nm{font-weight:600}
.cat{font-size:11px;color:var(--muted)}
.u{color:var(--muted);font-weight:400;font-size:12px}
.stepper{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
.stepper button{width:30px;height:32px;font-size:16px;font-weight:700;color:var(--muted)}
.stepper button:hover{background:var(--cream);color:var(--fresa)}
.stepper input{width:58px;height:32px;border:none;text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px;border-left:1px solid var(--line);border-right:1px solid var(--line)}
.stepper input:focus{outline:none;background:#FFF3F5}
.tag{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.tag.ok{background:#E6F4EC;color:var(--leaf)}
.tag.low{background:#FDF1DF;color:var(--amber)}
.tag.out{background:#FCE7EB;color:var(--fresa-dark)}
.tag.na{background:#F1EBEC;color:var(--muted)}
.bar{height:5px;border-radius:3px;background:#F5E5E8;overflow:hidden;width:70px;margin-top:5px}
.bar i{display:block;height:100%;border-radius:3px}

.comanda{background:#fff;border-radius:4px;position:relative;box-shadow:var(--shadow);border:1px solid var(--line)}
.comanda:before,.comanda:after{content:"";position:absolute;left:0;right:0;height:9px;background:radial-gradient(circle at 5px 0, transparent 5px, #fff 5px);background-size:12px 9px}
.comanda:before{top:-8px;transform:rotate(180deg)}
.comanda:after{bottom:-8px}
.comanda .top{padding:18px 20px 14px;border-bottom:2px dashed var(--line);text-align:center}
.comanda .top h3{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400}
.comanda .top .meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.comanda .body{padding:6px 20px;max-height:420px;overflow:auto}
.cl{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dotted var(--line)}
.cl:last-child{border-bottom:none}
.cl .info{flex:1;min-width:0}
.cl .info b{display:block;font-size:14px;font-weight:600}
.cl .info span{font-size:11px;color:var(--muted)}
.cl .x{color:#CFB6BC;font-size:18px;padding:0 4px}
.cl .x:hover{color:var(--fresa)}
.comanda .foot{padding:16px 20px;border-top:2px dashed var(--line);background:#FFFBFA;border-radius:0 0 4px 4px}
.warnflag{font-size:10px;color:var(--amber);font-weight:700;margin-top:2px}
.stockflag{font-size:10px;color:var(--fresa);font-weight:700;margin-top:2px}

.ped{padding:16px 18px;margin-bottom:12px}
.ped .hd{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ped .hd b{font-size:15px}
.ped .hd .mono{font-size:11px;color:var(--muted)}
.st{padding:4px 9px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.st.enviado{background:#FDF1DF;color:var(--amber)}
.st.aprobado{background:#E4F1F7;color:#1F6B8C}
.st.surtido,.st.recibido{background:#E6F4EC;color:var(--leaf)}
.st.cancelado{background:#F1EBEC;color:var(--muted)}
.lines{margin-top:12px;border-top:1px solid var(--line);padding-top:10px;max-height:460px;overflow:auto}
.pl{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dotted #F5E5E8;font-size:14px}
.pl:last-child{border-bottom:none}
.pl .n{flex:1;min-width:0;font-weight:600}
.provhead{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#1F6B8C;padding:10px 0 4px;border-top:1px dashed var(--line);margin-top:6px}

.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.kpi{padding:16px 18px}
.kpi .k{font-family:'Instrument Serif',serif;font-size:32px;line-height:1.1;margin-top:2px}
.kpi .k.red{color:var(--fresa)}
.focos{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.7}
.focos b{color:var(--ink)}
.moves{max-height:520px;overflow:auto}
.mv{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid #FAEDEF;font-size:13px;align-items:baseline}
.mv .t{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
.mv .d{flex:1}
.mv .q{font-family:'IBM Plex Mono',monospace;font-weight:700}
.mv .q.up{color:var(--leaf)}
.mv .q.dn{color:var(--fresa)}

#toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,120%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-size:14px;font-weight:600;z-index:200;transition:transform .28s cubic-bezier(.2,.8,.2,1);box-shadow:0 10px 30px -10px rgba(0,0,0,.5);max-width:88vw;text-align:center}
#toast.on{transform:translate(-50%,0)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
@media(max-width:640px){.hide-sm{display:none} h2.page{font-size:24px} .ctx{width:100%;margin-left:0}}
</style>
</head>
<body>

<!-- ===== Login ===== -->
<div id="login">
  <div class="loginbox">
    <div class="logo">🍓 Lady <em>Fresa</em></div>
    <div class="sublog">Inventario y requerimientos</div>
    <div class="card">
      <label for="lg-suc">¿Dónde estás?</label>
      <select id="lg-suc"></select>
      <label for="lg-pin">Tu PIN</label>
      <input type="password" id="lg-pin" inputmode="numeric" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')entrar()">
      <div class="loginerr" id="lg-err"></div>
      <button class="btn wide" onclick="entrar()">Entrar</button>
    </div>
  </div>
</div>

<!-- ===== App ===== -->
<div id="shell" style="display:none">
  <header>
    <div class="wrap">
      <div class="brandrow">
        <div class="logo">🍓 Lady <em>Fresa</em></div>
        <div class="ctx">
          <span id="ctxslot"></span>
          <button class="sync" onclick="sincronizar()"><span class="dot" id="dot"></span><span id="synctxt">Sincronizado</span></button>
          <button class="salir" onclick="salir()">Salir</button>
        </div>
      </div>
      <nav id="nav"></nav>
    </div>
  </header>
  <div class="wrap" id="app"></div>
</div>
<div id="toast"></div>

<script>
/* ============ Supabase ============
   Proyecto Lady Fresa Pos · tablas lfi_*
   Flujo: Proveedor -> Comisariato -> Tiendas
=================================== */
const SB_URL = 'https://ngpumyxxxlafuzcsaepy.supabase.co';
const SB_KEY = 'sb_publishable_6Kma0iIJ6mFCK1A7YTDnRw_HKqxsLQv';
const db = window.supabase.createClient(SB_URL, SB_KEY);

const LOCS = {
  centro:    {n:'Comisariato (Moctezuma)', short:'Comisariato'},
  moctezuma: {n:'Tienda Moctezuma', short:'Moctezuma'},
  narvarte:  {n:'Tienda Narvarte',  short:'Narvarte'},
  balbuena:  {n:'Tienda Balbuena',  short:'Balbuena'},
};

let CAT=[], INV={}, NIV={}, MOV=[], REQ=[], draft={};
let sesion = null;          // {sucursal, rol}
let who = 'moctezuma';      // sucursal que se está viendo
let tab='inv', q='', filtroCat='', cargando=false;

const hoy = () => new Date().toISOString().slice(0,10);
const money = n => '$' + (Math.round(n*100)/100).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
const item = id => CAT.find(i => i.id === id);
const stock = (loc,id) => (INV[loc] && INV[loc][id]) || 0;
const isDir = () => sesion && sesion.rol === 'direccion';
const verCentro = () => who === 'centro';

const nivel = (loc,id) => {
  const it = item(id); if (!it) return {min:0, par:0};
  if (loc === 'centro') return {min:Number(it.min_com), par:Number(it.par_com)};
  const n = NIV[loc] && NIV[loc][id];
  return {min: n ? Number(n.min_nivel) : 0, par: n ? Number(n.par_nivel) : 0};
};

function estado(loc,id){
  const {min,par} = nivel(loc,id);
  if (par === 0) return 'na';                  // insumo que esa tienda no maneja
  const s = stock(loc,id);
  if (s <= 0) return 'out';
  if (s <= min) return 'low';
  return 'ok';
}
const etiqueta = e => e==='out'?'Agotado' : e==='low'?'Bajo' : e==='na'?'No aplica' : 'OK';

function comprometido(id){
  return REQ.filter(r => r.tipo==='tienda' && (r.estado==='enviado' || r.estado==='aprobado'))
    .reduce((a,r) => { const l = r.lineas.find(x => x.insumo_id === id); return a + (l ? Number(l.aprob||0) : 0); }, 0);
}
const disponibleReal = id => stock('centro',id) - comprometido(id);
const sugerir = (loc,i) => loc === 'centro'
  ? Math.max(0, Number(i.par_com) - disponibleReal(i.id))
  : Math.max(0, nivel(loc,i.id).par - stock(loc,i.id));

/* ============ Login ============ */
function pintarLogin(){
  document.getElementById('lg-suc').innerHTML = Object.keys(LOCS)
    .map(l => `<option value="${l}">${LOCS[l].n}</option>`).join('');
}
async function entrar(){
  const suc = document.getElementById('lg-suc').value;
  const pin = document.getElementById('lg-pin').value.trim();
  const err = document.getElementById('lg-err');
  err.textContent = '';
  if (!pin){ err.textContent = 'Escribe tu PIN.'; return; }
  const { data, error } = await db.from('lfi_accesos').select('*').eq('sucursal',suc).eq('pin',pin).maybeSingle();
  if (error){ err.textContent = 'No hay conexión con la base.'; return; }
  if (!data){ err.textContent = 'PIN incorrecto para esa sucursal.'; document.getElementById('lg-pin').value=''; return; }
  sesion = {sucursal:data.sucursal, rol:data.rol};
  sessionStorage.setItem('lfi_sesion', JSON.stringify(sesion));
  who = sesion.sucursal;
  await arrancar();
}
function salir(){
  sessionStorage.removeItem('lfi_sesion');
  sesion = null;
  document.getElementById('shell').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('lg-pin').value = '';
}
async function arrancar(){
  document.getElementById('login').style.display = 'none';
  document.getElementById('shell').style.display = 'block';
  tab = 'inv';
  await cargar(); render();
}

/* ============ Carga ============ */
function setDot(e, txt){
  const d = document.getElementById('dot'), t = document.getElementById('synctxt');
  if (!d) return;
  d.className = 'dot' + (e ? ' ' + e : '');
  t.textContent = txt;
}

async function cargar(silencioso){
  if (cargando) return;
  cargando = true;
  if (!silencioso) setDot('busy','Sincronizando…');
  try{
    const [ins, stk, niv, peds, lins, movs] = await Promise.all([
      db.from('lfi_insumos').select('*').eq('activo',true).order('categoria').order('nombre'),
      db.from('lfi_stock').select('*'),
      db.from('lfi_niveles').select('*'),
      db.from('lfi_pedidos').select('*').order('created_at',{ascending:false}).limit(60),
      db.from('lfi_pedido_lineas').select('*'),
      db.from('lfi_movimientos').select('*').eq('sucursal',who).order('created_at',{ascending:false}).limit(200),
    ]);
    const bad = [ins,stk,niv,peds,lins,movs].find(r => r.error);
    if (bad) throw bad.error;

    CAT = ins.data;
    INV = {}; NIV = {};
    Object.keys(LOCS).forEach(l => { INV[l] = {}; NIV[l] = {}; });
    stk.data.forEach(s => { if (INV[s.sucursal]) INV[s.sucursal][s.insumo_id] = Number(s.cantidad); });
    niv.data.forEach(n => { if (NIV[n.sucursal]) NIV[n.sucursal][n.insumo_id] = n; });
    REQ = peds.data.map(p => ({...p, lineas: lins.data.filter(l => l.pedido_id === p.id)}));
    MOV = movs.data;
    setDot('', 'Sincronizado');
  } catch(e){
    console.error(e);
    setDot('err','Sin conexión');
    toast('No se pudo conectar con la base de datos.');
  }
  cargando = false;
}
async function sincronizar(){ await cargar(); render(); }

/* ============ Acciones ============ */
async function ajustar(loc, id, val){
  const nueva = Math.max(0, Number(val)||0);
  if (nueva === stock(loc,id)) return;
  INV[loc][id] = nueva; render();
  setDot('busy','Guardando…');
  const { error } = await db.rpc('lfi_ajustar', {p_suc:loc, p_insumo:id, p_nueva:nueva, p_por:LOCS[sesion.sucursal].short});
  if (error) toast('No se guardó el ajuste. Revisa tu conexión.');
  await cargar(true); render();
}

function addDraft(id, cant){
  const c = Math.max(0, Number(cant)||0);
  if (c === 0) delete draft[id]; else draft[id] = c;
  render();
}

function autollenar(){
  draft = {};
  CAT.forEach(i => { const s = sugerir(who,i); if (s > 0) draft[i.id] = s; });
  const hay = Object.keys(draft).length;
  if (verCentro()) toast(hay ? 'Orden llenada: reponer par + cubrir pedidos pendientes' : 'El comisariato está surtido. No hace falta comprar.');
  else toast(hay ? 'Requerimiento llenado con lo que te falta para el nivel par' : 'Todo está en nivel par. No hace falta pedir nada.');
  render();
}

async function enviarPedido(){
  const lineas = Object.entries(draft).filter(([,c]) => c > 0);
  if (!lineas.length) return;
  const tipo = verCentro() ? 'compra' : 'tienda';
  setDot('busy','Enviando…');
  const { data:ped, error } = await db.from('lfi_pedidos')
    .insert({tipo, sucursal:who, fecha:hoy(), estado: tipo==='compra' ? 'aprobado' : 'enviado'})
    .select().single();
  if (error){ toast('No se pudo enviar el pedido.'); setDot('err','Error'); return; }
  const { error:e2 } = await db.from('lfi_pedido_lineas')
    .insert(lineas.map(([id,c]) => ({pedido_id:ped.id, insumo_id:id, cant:c, aprob:c})));
  if (e2) toast('El pedido se creó pero fallaron las líneas.');
  draft = {};
  toast(tipo === 'compra' ? 'Orden de compra generada' : 'Pedido enviado al comisariato');
  tab = tipo === 'compra' ? 'com' : 'ped';
  await cargar(true); render();
}

async function setEstado(rid, est){
  setDot('busy','Guardando…');
  const { error } = await db.from('lfi_pedidos').update({estado:est}).eq('id',rid);
  toast(error ? 'No se pudo actualizar el pedido.' : (est==='aprobado' ? 'Pedido aprobado' : 'Pedido cancelado'));
  await cargar(true); render();
}
async function setLinea(lid, val){
  setDot('busy','Guardando…');
  await db.from('lfi_pedido_lineas').update({aprob: Math.max(0, Number(val)||0)}).eq('id',lid);
  await cargar(true); render();
}
async function surtir(rid){

async function nuevoInsumo(){

  const nombre = v('ni-nombre').trim();
  if (!nombre){ toast('Ponle nombre al insumo'); return; }
  setDot('busy','Guardando…');
  const { error } = await db.from('lfi_insumos').insert({
    nombre, categoria:v('ni-cat')||'General', unidad:v('ni-uni')||'pza',

async function borrarInsumo(id){
  setDot('busy','Guardando…');
  await db.from('lfi_insumos').update({activo:false}).eq('id',id);
  toast('Insumo dado de baja');
  await cargar(true); render();
}
async function editarInsumo(id, campo, val){
  const num = !['nombre','categoria','unidad','proveedor'].includes(campo);
  const patch = {}; patch[campo] = num ? (Number(val)||0) : val;
  const it = item(id); if (it) it[campo] = patch[campo];
  setDot('busy','Guardando…');
  const { error } = await db.from('lfi_insumos').update(patch).eq('id',id);
  setDot(error ? 'err' : '', error ? 'Sin guardar' : 'Sincronizado');
}
async function editarNivel(loc, id, campo, val){
  const n = nivel(loc,id);
  const fila = {sucursal:loc, insumo_id:id, min_nivel:n.min, par_nivel:n.par};
  fila[campo] = Math.max(0, Number(val)||0);
  setDot('busy','Guardando…');
  const { error } = await db.from('lfi_niveles').upsert(fila, {onConflict:'sucursal,insumo_id'});
  if (error){ setDot('err','Sin guardar'); toast('No se guardó el nivel.'); return; }
  if (!NIV[loc][id]) NIV[loc][id] = fila; else NIV[loc][id][campo] = fila[campo];
  setDot('','Sincronizado');
}

const cats = () => [...new Set(CAT.map(i => i.categoria))];
function filtra(soloActivos){
  return CAT.filter(i => {
    if (filtroCat && i.categoria !== filtroCat) return false;
    if (q && !(i.nombre + ' ' + i.categoria + ' ' + (i.proveedor||'')).toLowerCase().includes(q.toLowerCase())) return false;
    if (soloActivos && nivel(who,i.id).par === 0 && !stock(who,i.id)) return false;   // esa tienda no lo maneja
    return true;
  });
}

const chips = () => `<div class="chips" style="margin-bottom:12px">

</div>`;

  <div class="grid3" style="margin-bottom:16px">

    <div class="card kpi"><span class="eyebrow">Insumos por resurtir</span><div class="k ${bajos?'red':''}">${bajos}</div></div>

function vPedidos(){
  const mios = REQ.filter(r => r.tipo === 'tienda' && (isDir() || r.sucursal === sesion.sucursal));
  if (!mios.length) return `<h2 class="page">Pedidos de tiendas</h2>
    <p class="sub">Aquí llegan los requerimientos que las tiendas mandan al comisariato.</p>
    <div class="card empty"><b>Todavía no hay pedidos</b>Cuando una tienda envíe su requerimiento del día, aparecerá aquí.</div>`;

  const cards = mios.map(r => {
    const editable = isDir() && r.estado === 'enviado';
    const total = r.lineas.reduce((a,l) => a + Number(l.aprob||0) * Number(item(l.insumo_id)?.costo||0), 0);
    const lines = r.lineas.map(l => {
      const i = item(l.insumo_id); if (!i) return '';
      const disp = stock('centro', l.insumo_id);
      const corto = ['enviado','aprobado'].includes(r.estado) && Number(l.aprob) > disp;
      const parcial = l.surtido != null && Number(l.surtido) < Number(l.cant);
      return `<div class="pl">
        <span class="n">${i.nombre}${corto ? `<span class="tag out" style="margin-left:5px">Solo hay ${disp}</span>` : ''}</span>
        <span class="mono" style="color:var(--muted);font-size:12px">pidió ${l.cant} ${i.unidad}</span>
        ${editable
          ? `<input type="number" value="${l.aprob}" style="width:72px" class="mono" onchange="setLinea(${l.id}, this.value)">`
          : `<span class="mono" style="font-weight:700">${l.surtido ?? l.aprob} ${i.unidad}${parcial ? ' ⚠' : ''}</span>`}
      </div>`;
    }).join('');

    let acciones = '';
    if (isDir()){
      if (r.estado === 'enviado')  acciones = `<button class="btn sm" onclick="setEstado('${r.id}','aprobado')">Aprobar</button><button class="btn sm ghost" onclick="setEstado('${r.id}','cancelado')">Cancelar</button>`;
      if (r.estado === 'aprobado') acciones = `<button class="btn sm dark" onclick="surtir('${r.id}')">Marcar como surtido</button>`;
    }

    return `<div class="card ped">
      <div class="hd">
        <b>${LOCS[r.sucursal].short}</b>
        <span class="st ${r.estado}">${r.estado}</span>
        <span class="mono">${r.fecha} · ${new Date(r.created_at).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}</span>
        <span style="margin-left:auto" class="row">${acciones}</span>
      </div>
      <div class="lines">${lines}</div>
      <div class="row" style="justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--line)">
        <span class="eyebrow">${r.estado==='surtido'?'Costo surtido':'Costo estimado'}</span>
        <span class="mono" style="font-weight:700">${money(total)}</span>
      </div>
    </div>`;
  }).join('');

  return `<h2 class="page">Pedidos de tiendas</h2>
  <p class="sub">${isDir() ? 'Ajusta cantidades, aprueba y surte. Al surtir, el insumo sale del comisariato y entra a la tienda.' : 'El estado de tus requerimientos.'}</p>
  ${cards}`;
}

    </tr>`;
  }).join('');

  return `<h2 class="page">Catálogo de insumos</h2>
  <p class="sub"><b>Mín</b> dispara el foco rojo. <b>Par</b> es el nivel ideal: la diferencia contra lo que hay es lo que el sistema sugiere pedir. Los niveles que ves son los de <b>${LOCS[who].short}</b> — cámbiate de sucursal arriba para editar los de otra. Un par en <b>0</b> significa que esa tienda no maneja el insumo.</p>
  ${isDir() ? `<div class="card" style="padding:16px;margin-bottom:16px">
    <span class="eyebrow">Agregar insumo</span>
    <div class="row" style="margin-top:10px">
      <input type="text" id="ni-nombre" placeholder="Nombre" style="flex:2;min-width:140px">
      <input type="text" id="ni-cat" placeholder="Categoría" value="Comestibles" style="flex:1;min-width:105px">
      <input type="text" id="ni-uni" placeholder="Unidad" value="pza" style="width:75px">
      <input type="number" id="ni-costo" placeholder="Costo" style="width:85px">
      <input type="text" id="ni-prov" placeholder="Proveedor" style="min-width:120px">
      <input type="number" id="ni-minc" placeholder="Mín comis." value="0" style="width:105px">
      <input type="number" id="ni-parc" placeholder="Par comis." value="0" style="width:105px">
      <button class="btn" onclick="nuevoInsumo()">Agregar</button>
    </div>
  </div>` : ''}
  ${buscador('style="width:100%;margin-bottom:12px"')}
  ${chips()}
  <div class="card" style="overflow:auto">
    <table class="tbl">
      <thead><tr><th>Insumo</th><th class="hide-sm">Categoría</th><th>Un.</th><th>Costo</th><th>Proveedor</th>
      <th style="background:#FFFAF9">Mín</th><th style="background:#FFFAF9">Par</th><th></th></tr></thead>
      <tbody>${rows || '<tr><td colspan="8" class="empty">Sin resultados.</td></tr>'}</tbody>
    </table>
  </div>`;
}

/* ============ Render ============ */
function render(){
  const pend = REQ.filter(r => r.tipo==='tienda' && r.estado === 'enviado').length;
  const rec  = REQ.filter(r => r.tipo==='compra' && r.estado === 'aprobado').length;

  const tabs = [
    ['inv','Inventario',0],
    ['req', verCentro() ? 'Compra a proveedor' : 'Requerimiento', 0],
    ['ped','Pedidos', isDir() ? pend : 0],
  ];
  if (isDir()) tabs.push(['com','Compras', rec]);
  if (isDir()) tabs.push(['pan','Panel',0]);
  tabs.push(['mov','Movimientos',0], ['cat','Catálogo',0]);

  const views = {inv:vInventario, req:vRequerimiento, ped:vPedidos, com:vCompras, pan:vPanel, mov:vMovimientos, cat:vCatalogo};
  if (!views[tab] || (['com','pan'].includes(tab) && !isDir())) tab = 'inv';

  // contexto: dirección puede cambiar de sucursal; la tienda queda fija en la suya
  document.getElementById('ctxslot').innerHTML = isDir()
    ? `<label for="who" style="margin-right:6px">Viendo</label>
       <select id="who">${Object.keys(LOCS).map(l => `<option value="${l}" ${who===l?'selected':''}>${LOCS[l].n}</option>`).join('')}</select>`
    : `<span class="aqui">${LOCS[sesion.sucursal].short}</span>`;
  if (isDir()) document.getElementById('who').addEventListener('change', async e => {
    who = e.target.value; draft = {}; q=''; filtroCat=''; tab = 'inv';
    await cargar(); render();
  });

  document.getElementById('nav').innerHTML = tabs.map(([k,n,p]) =>
    `<button class="${tab===k?'on':''}" onclick="tab='${k}';q='';render()">${n}${p?`<span class="pip">${p}</span>`:''}</button>`).join('');
  document.getElementById('app').innerHTML = views[tab]();

  const g = document.getElementById('reqgrid');
  if (g && window.innerWidth > 860) g.style.gridTemplateColumns = '1fr 1.2fr';
}

let tt;
function toast(m){
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('on');
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('on'), 3400);
}

window.addEventListener('focus', async () => { if (sesion){ await cargar(true); render(); } });
setInterval(async () => { if (sesion && document.visibilityState === 'visible'){ await cargar(true); render(); } }, 45000);

/* ============ Arranque ============ */
pintarLogin();
const guardada = sessionStorage.getItem('lfi_sesion');
if (guardada){
  try{ sesion = JSON.parse(guardada); who = sesion.sucursal; arrancar(); }
  catch(e){ sessionStorage.removeItem('lfi_sesion'); }
}
</script>
